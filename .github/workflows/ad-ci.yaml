# CI for Ad Service

name: ad-ci

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          cd src/ad
          chmod +x gradlew
          ./gradlew build -x test

  docker:
    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: src/ad
          file: src/ad/Dockerfile
          push: true
          tags: 281145281565.dkr.ecr.eu-west-3.amazonaws.com/opentelemetry/ad:${{ github.run_id }}

  updatek8s:
    runs-on: ubuntu-latest

    needs: docker

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update tag in kubernetes deployment manifest
        run: |
          sed -i "s|image: .*|image: 281145281565.dkr.ecr.eu-west-3.amazonaws.com/opentelemetry/ad:${{ github.run_id }}|" kubernetes/ad/deploy.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "devops@users.noreply.github.com"
          git config --global user.name "Jawher Amiri"
          git add kubernetes/ad/deploy.yaml
          git commit -m "[CI]: Update ad image tag" || echo "No changes to commit"
          git push origin HEAD:main -f
